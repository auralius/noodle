site_name: Noodle - The Documentation
site_url: https://auralius.github.io/noodle/
repo_url: https://github.com/auralius/noodle/

nav:
- Home: index.md
- API References: doxygen/index.html
- Anomali Detection on ESP32: ad-esp32.md
- Peak Detection on ESP32: ecg-peak-detect.md
- Blood-MNIST Classification on ESP32: blood.md
- Visual Wake Word on ESP32: vww-esp32.md
- LeNet-5 on ESP32: lenet-5-esp32.md
- LeNet-5 on Pico: lenet-5-pico.md
- SD-Card–Backed LeNet-5: lenet-5-bluepill.md
- Two-Layer FCN on UNO R3: fcn-uno.md
- Mobile-LeNet: mobile-lenet.md

theme:
  name: material
  logo: attachments/noodle.png
  favicon: attachments/noodle.png
  features:
    - toc.integrate

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.superfences
  - pymdownx.mark
  - extra

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/extra.css
  
exclude_docs: |
  doxygen/