; --------------------------------------------------------------------------------------------
; --- Settings for STM32U585CIU6 (WeAct Mini Core) ---
; --- PneumoniaMNIST dataset ---
; --------------------------------------------------------------------------------------------
[env:stm32u585-pneumonia]
platform = ststm32
framework = arduino
board = genericSTM32U585CIU6_custom

monitor_speed = 921600
monitor_dtr = 1

build_src_filter =
  +<*>
  -<blood.cpp>
  +<pneumonia.cpp>

lib_deps =
  symlink:///home/auralius/works/noodle

build_flags =
  -O3
  -ffast-math
  -funroll-loops

  -D NOODLE_USE_NONE
  -D NOODLE_POOL_MODE=NOODLE_POOL_NONE
  -D NOODLE_MAX_K=3

  -D PIO_FRAMEWORK_ARDUINO_ENABLE_CDC
  -D USBCON
  -D STM32U585xx

upload_protocol = dfu

; --------------------------------------------------------------------------------------------
; --- Settings for STM32U585CIU6 DEBUG ---
; --- PneumoniaMNIST dataset ---
; --------------------------------------------------------------------------------------------
[env:stm32u585-pneumonia-debug]
platform = ststm32
framework = arduino
board = genericSTM32U585CIU6_custom

monitor_speed = 921600
monitor_dtr = 1

build_src_filter =
  +<*>
  -<blood.cpp>
  +<pneumonia.cpp>

lib_deps =
  symlink:///home/auralius/works/noodle

build_type = debug

build_flags =
  -Og
  -g3

  -D NOODLE_USE_NONE
  -D NOODLE_POOL_MODE=NOODLE_POOL_NONE
  -D NOODLE_MAX_K=3

  -D PIO_FRAMEWORK_ARDUINO_ENABLE_CDC
  -D USBCON
  -D STM32U585xx

upload_protocol = stlink
debug_tool = stlink
debug_init_break = tbreak setup

debug_build_flags =
  -Og
  -g3

debug_extra_cmds =
  monitor reset halt