[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 115200

lib_deps =
    symlink:///home/auralius/works/noodle

build_flags =
    -D NOODLE_USE_NONE
    -D NOODLE_FCN_BLOCK=16
    -D NOODLE_POOL_MODE=NOODLE_POOL_MAX
    -D ECG_VERBOSE=0

; No custom partition table is used.
; Weight files in /data are for copying to the SD-card root, not SPIFFS/FFat upload.
